version: 0.2

env:
  variables:
    MAVEN_OPTS: "-Xmx1024m"
  parameter-store:
    ANYPOINT_USERNAME: "/Muleclass1/anypoint-username"
    ANYPOINT_PASSWORD: "/Muleclass1/anypoint-password"

phases:
  install:
    runtime-versions:
      java: corretto17
    commands:
      - java -version
      - mvn -version

  pre_build:
    commands:
      - mkdir -p ~/.m2
      - python3 -c "import os; f=open(os.path.expanduser('~/.m2/settings.xml'),'w'); f.write('<settings><servers><server><id>anypoint-exchange-v3</id><username>'+os.environ['ANYPOINT_USERNAME']+'</username><password>'+os.environ['ANYPOINT_PASSWORD']+'</password></server><server><id>mulesoft-releases</id><username>'+os.environ['ANYPOINT_USERNAME']+'</username><password>'+os.environ['ANYPOINT_PASSWORD']+'</password></server></servers></settings>'); f.close()"
      - echo "Settings ready"

  build:
    commands:
      - echo "Step 1 - Build and publish JAR to Anypoint Exchange"
      - mvn clean deploy --no-transfer-progress -Danypoint.username="$ANYPOINT_USERNAME" -Danypoint.password="$ANYPOINT_PASSWORD"
      - echo "Step 2 - Deploy from Exchange to CloudHub 2.0"
      - mvn mule:deploy -DmuleDeploy --no-transfer-progress -Danypoint.username="$ANYPOINT_USERNAME" -Danypoint.password="$ANYPOINT_PASSWORD"

  post_build:
    commands:
      - echo "Done - status $CODEBUILD_BUILD_SUCCEEDING"

cache:
  paths:
    - "/root/.m2/**/*"
