version: 0.2

env:
  variables:
    MAVEN_OPTS: "-Xmx1024m"
    ANYPOINT_ENVIRONMENT: "Sandbox"
    CLOUDHUB_TARGET: "Shared Space"
    CLOUDHUB_REPLICAS: "1"
    CLOUDHUB_VCORES: "0.1"
  parameter-store:
    ANYPOINT_USERNAME: "/Muleclass1/anypoint-username"
    ANYPOINT_PASSWORD: "/Muleclass1/anypoint-password"

phases:
  install:
    runtime-versions:
      java: corretto17
    commands:
      - echo "Install phase"
      - java -version
      - mvn -version

  pre_build:
    commands:
      - echo "Pre-build phase"
      - mkdir -p ~/.m2
      - printf '<?xml version="1.0" encoding="UTF-8"?>\n<settings>\n  <servers>\n    <server>\n      <id>anypoint-exchange-v3</id>\n      <username>%s</username>\n      <password>%s</password>\n    </server>\n    <server>\n      <id>mulesoft-releases</id>\n      <username>%s</username>\n      <password>%s</password>\n    </server>\n  </servers>\n</settings>\n' "$ANYPOINT_USERNAME" "$ANYPOINT_PASSWORD" "$ANYPOINT_USERNAME" "$ANYPOINT_PASSWORD" > ~/.m2/settings.xml
      - echo "settings.xml written"
      - echo "App=$APP_NAME | Env=$ANYPOINT_ENVIRONMENT | Org=$ANYPOINT_ORG_ID | Target=$CLOUDHUB_TARGET"

  build:
    commands:
      - echo "Deploying to CloudHub 2.0 Shared Space"
      - mvn clean deploy -DmuleDeploy -Danypoint.username="$ANYPOINT_USERNAME" -Danypoint.password="$ANYPOINT_PASSWORD" -Danypoint.environment="$ANYPOINT_ENVIRONMENT" -Danypoint.businessGroupId="$ANYPOINT_ORG_ID" -Dcloudhub.applicationName="$APP_NAME" -Dcloudhub.target="$CLOUDHUB_TARGET" -Dcloudhub.replicas="$CLOUDHUB_REPLICAS" -Dcloudhub.vCores="$CLOUDHUB_VCORES" --no-transfer-progress

  post_build:
    commands:
      - |
        if [ "$CODEBUILD_BUILD_SUCCEEDING" = "1" ]; then
          echo "Deployment SUCCEEDED - check anypoint.mulesoft.com Runtime Manager"
        else
          echo "Deployment FAILED - check Maven output above"
          exit 1
        fi

cache:
  paths:
    - "/root/.m2/**/*"
