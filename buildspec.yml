version: 0.2
env:
  variables:
    MAVEN_OPTS: "-Xmx1024m"
    ANYPOINT_ENVIRONMENT: "Sandbox"
  parameter-store:
    ANYPOINT_USERNAME: "/Muleclass1/anypoint-username"
    ANYPOINT_PASSWORD: "/Muleclass1/anypoint-password"
phases:
  install:
    runtime-versions:
      java: corretto17
    commands:
      - echo "Install phase"
      - java -version
      - mvn -version
  pre_build:
    commands:
      - echo "Pre-build phase"
      - mkdir -p ~/.m2
      - printf '<?xml version="1.0" encoding="UTF-8"?>\n<settings>\n  <servers>\n    <server>\n      <id>anypoint-exchange-v3</id>\n      <username>%s</username>\n      <password>%s</password>\n    </server>\n    <server>\n      <id>MuleRepository</id>\n      <username>%s</username>\n      <password>%s</password>\n    </server>\n  </servers>\n</settings>\n' "$ANYPOINT_USERNAME" "$ANYPOINT_PASSWORD" "$ANYPOINT_USERNAME" "$ANYPOINT_PASSWORD" > ~/.m2/settings.xml
      - echo "settings.xml written"

  build:
    commands:
      - echo "Deploying to CloudHub"
      - mvn clean deploy -DmuleDeploy -Danypoint.username="$ANYPOINT_USERNAME" -Danypoint.password="$ANYPOINT_PASSWORD" -Danypoint.environment="$ANYPOINT_ENVIRONMENT" -Danypoint.businessGroup="$ANYPOINT_ORG_ID" -Dcloudhub.applicationName="$APP_NAME" -Dcloudhub.region="$CLOUDHUB_REGION" -Dcloudhub.workers=1 -Dcloudhub.workerType="Micro" --no-transfer-progress

  post_build:
    commands:
      - echo "Done - status $CODEBUILD_BUILD_SUCCEEDING"
cache:
  paths:
    - "/root/.m2/**/*"
