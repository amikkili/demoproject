version: 0.2

env:
  variables:
    MAVEN_OPTS: "-Xmx1024m"
    APP_NAME: "demoproject"
    ANYPOINT_ENV: "Sandbox"
    ANYPOINT_ORG: "a83d760c-d47d-492f-a442-1b8bef1f102f"
  parameter-store:
    ANYPOINT_USERNAME: "/Muleclass1/anypoint-username"
    ANYPOINT_PASSWORD: "/Muleclass1/anypoint-password"

phases:
  install:
    runtime-versions:
      java: corretto17
    commands:
      - java -version
      - mvn -version
      - npm install -g anypoint-cli-v4
      - anypoint-cli-v4 --version

  pre_build:
    commands:
      - mkdir -p ~/.m2
      - python3 -c "import os; f=open(os.path.expanduser('~/.m2/settings.xml'),'w'); f.write('<settings><servers><server><id>anypoint-exchange-v3</id><username>'+os.environ['ANYPOINT_USERNAME']+'</username><password>'+os.environ['ANYPOINT_PASSWORD']+'</password></server><server><id>mulesoft-releases</id><username>'+os.environ['ANYPOINT_USERNAME']+'</username><password>'+os.environ['ANYPOINT_PASSWORD']+'</password></server></servers></settings>'); f.close()"
      - echo "settings.xml created"

  build:
    commands:
      - mvn clean package --no-transfer-progress
      - ls -lh target/
      - anypoint-cli-v4 runtime-mgr cloudhub2-application deploy --username "$ANYPOINT_USERNAME" --password "$ANYPOINT_PASSWORD" --organization "$ANYPOINT_ORG" --environment "$ANYPOINT_ENV" --runtime-version "4.6.0:e2" --target "Shared Space" --replicas 1 --vcores 0.1 "$APP_NAME" "$(ls target/*-mule-application.jar | head -1)"

  post_build:
    commands:
      - echo "Build complete - status $CODEBUILD_BUILD_SUCCEEDING"

cache:
  paths:
    - "/root/.m2/**/*"
